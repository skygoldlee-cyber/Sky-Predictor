[mypy]
python_version = 3.12
warn_return_any = False
warn_unused_ignores = False
no_implicit_optional = True
ignore_missing_imports = True

# The project includes optional runtime dependencies (PySide6/qasync/qt_material,
# LLM providers, pandas without stubs). We focus type checking on core modules.

[mypy-adaptive_indicator.usage_example]
ignore_errors = True

[mypy-adaptive_indicator.simulate_indicators]
ignore_errors = True

[mypy-tests.*]
ignore_errors = True

[mypy-prediction.data_builder]
ignore_errors = True

[mypy-ebest_live]
ignore_errors = True

[mypy-main]
ignore_errors = True

[mypy-config]
ignore_errors = True

[mypy-logging_utils]
ignore_errors = True

[mypy-alarm_led]
ignore_errors = True

[mypy-prediction.features]
ignore_errors = True

[mypy-prediction.time_features]
ignore_errors = True

[mypy-prediction.predictor]
ignore_errors = True

[mypy-prediction.model]
ignore_errors = True

[mypy-prediction.tft_model]
ignore_errors = True
